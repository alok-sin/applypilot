# ApplyPilot search configuration
# Copy to ~/.applypilot/searches.yaml and customize for your job search.
# The wizard (applypilot init) generates a basic version automatically.

# Search queries -- each has a query string and priority tier.
# Tier 1: High-priority exact matches (searched first, highest precision)
# Tier 2: Strong matches, broader scope
# Tier 3: Wide net, high volume, lower precision
queries:
  - query: "software engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1
  - query: "backend developer"
    tier: 1
  - query: "full stack developer"
    tier: 2
  - query: "full stack engineer"
    tier: 2
  - query: "python developer"
    tier: 2
  - query: "python engineer"
    tier: 2
  - query: "DevOps engineer"
    tier: 2
  - query: "site reliability engineer"
    tier: 2
  - query: "platform engineer"
    tier: 2
  - query: "cloud engineer"
    tier: 2
  - query: "data engineer"
    tier: 2
  - query: "infrastructure engineer"
    tier: 2
  - query: "software developer"
    tier: 3
  - query: "developer"
    tier: 3
  - query: "systems engineer"
    tier: 3
  - query: "automation engineer"
    tier: 3
  - query: "solutions engineer"
    tier: 3
  - query: "integration engineer"
    tier: 3
  - query: "ML engineer"
    tier: 3
  - query: "machine learning engineer"
    tier: 3
  - query: "AI engineer"
    tier: 3
  - query: "security engineer"
    tier: 3

# Locations to search
locations:
  - location: "San Francisco, CA"
    remote: false
  - location: "Remote"
    remote: true

# Location filtering -- accept/reject patterns for job location text
location:
  accept_patterns:
    - "San Francisco"
    - "Bay Area"
    - "SF"
    - "California"
    - "CA"
    - "Remote"
    - "Anywhere"
    - "United States"
    - "US"
    - "USA"
  reject_patterns:
    - "New York only"
    - "Seattle only"
    - "onsite only"
    - "London, UK"
    - "India"
    - "Philippines"

# Country for Indeed/LinkedIn/Google Jobs searches
country: "USA"

# JobSpy backends (enabled set; all available: indeed, linkedin, naukri, google, glassdoor, zip_recruiter, bayt, bdjobs)
sites:
  - indeed
  - linkedin
  - glassdoor
  - zip_recruiter
  - google

# Restrict the discover stage to a subset of backends. Omit or leave empty to run all.
# discover_backends: [jobspy, workday, greenhouse, smartrecruiters, smartextract]

# Only crawl employers whose registry entry has matching tags (union). Omit to crawl all.
# discover_tags: [faang, fintech]

# Substring location filters applied to scraped rows (case-insensitive).
# location_accept: ["United States", "Remote"]
# location_reject_non_remote: ["India", "Philippines"]

# Search defaults
defaults:
  results_per_site: 100  # Max results per board per query
  hours_old: 72          # Only jobs posted within this many hours
  blocked_countries: []          # Hard reject if location clearly names these, e.g. ["India", "UK"]
  seniority_floor_years: 4       # If profile years-of-experience >= this, rule gate rejects junior/entry/intern titles
  llm_sweep_enabled: true        # Cheap per-job LLM classifier at end of discover (first line of defense)

# Negative keywords -- skip jobs with these in the title (case-insensitive)
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
