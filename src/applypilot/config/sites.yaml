# Direct career site registry for ApplyPilot
# Users can add their own sites following this pattern.
# Use {location_encoded} placeholder for location (URL-encoded).
# Use {query_encoded} placeholder for search terms (URL-encoded).
#
# Tag vocabulary for `tags:` on each site (OR-match against searches.yaml
# `discover_tags`). Sites without `tags:` always run (backwards compat).
#   Region: india, canada, us, uk
#   Modality: remote (remote-only), global (location-agnostic aggregator)

# ── Manual-Only ATS Domains ──────────────────────────────────────────────
# These ATS platforms have unsolvable CAPTCHAs. Jobs routing through them
# are flagged as "manual" during apply — bot skips, user applies by hand.
manual_ats:
  - "ibegin.tcsapps.com"       # TCS iBegin — unsolvable CAPTCHA every time

# ── Blocked sites — too problematic for automation ───────────────────────
blocked:
  sites:
    - "glassdoor"
    - "google"
    - "accenture"
    - "AccentureCareers"
    - "Workopolis"
  url_patterns:
    - "%glassdoor%"
    - "%google.com/about/careers%"
    - "%google.jobs%"
    - "%accenture%"
    - "%workopolis.com/out%"

# ── Blocked SSO domains — cannot authenticate through these ──────────────
blocked_sso:
  - "accounts.google.com"
  - "login.microsoftonline.com"
  - "okta.com"
  - "auth0.com"
  - "sso.cisco.com"

# ── Hosts the smartextract Judge should skip without an LLM call ─────────
# Analytics, error reporting, ads, maps, consent banners, in-app messaging,
# CDNs — never serve job listings. Substring match on the response URL.
judge_blocked_hosts:
  - "sentry.io"
  - "ingest.sentry.io"
  - "hubspot.com"
  - "hubapi.com"
  - "hsforms.net"
  - "hscollectedforms.net"
  - "ads.linkedin.com"
  - "px.ads.linkedin.com"
  - "google-analytics.com"
  - "googletagmanager.com"
  - "doubleclick.net"
  - "googleapis.com/maps"
  - "maps.googleapis.com"
  - "maps.gstatic.com"
  - "onetrust.com"
  - "cookielaw.org"
  - "productfruits.com"
  - "intercom.io"
  - "intercomcdn.com"
  - "segment.io"
  - "segment.com"
  - "mixpanel.com"
  - "amplitude.com"
  - "fullstory.com"
  - "hotjar.com"
  - "logrocket.com"
  - "cloudflareinsights.com"
  - "facebook.com/tr"
  - "connect.facebook.net"

# ── Base URLs for URL resolution ─────────────────────────────────────────
# Used by detail enrichment to resolve relative URLs scraped from sites.
# Sites not listed here (or with null) cannot have relative URLs resolved.
base_urls:
  "Job Bank Canada": "https://www.jobbank.gc.ca"
  "CareerJet Canada": "https://www.careerjet.ca"
  "BuiltIn Remote": "https://builtin.com"
  "Hacker News Jobs": "https://news.ycombinator.com/"
  "RemoteOK": null
  "WelcomeToTheJungle": null
  "Workopolis": "https://www.workopolis.com"
  "WeWorkRemotely": "https://weworkremotely.com"
  "Startup.jobs": "https://startup.jobs"
  "Nodesk": "https://nodesk.co"
  "Talent.com": "https://www.talent.com"
  "JustRemote": "https://justremote.co"
  "Arc.dev": "https://arc.dev"
  "Himalayas": "https://himalayas.app"
  "Techstars Jobs": "https://www.techstars.com"
  "Randstad Canada": "https://www.randstad.ca/jobs/search/"
  "Lensa": "https://lensa.com"
  "4DayWeek": "https://4dayweek.io"

sites:
  # ── Searchable sites (URL includes query + location params) ──────────
  # Canada-specific
  - name: "Eluta"
    url: "https://www.eluta.ca/search?q={query_encoded}&l={location_encoded}"
    type: search
    tags: [canada]

  - name: "Talent.com"
    url: "https://www.talent.com/jobs?k={query_encoded}&l={location_encoded}"
    type: search
    tags: [canada]

  - name: "Randstad Canada"
    url: "https://www.randstad.ca/jobs/?keywords={query_encoded}&location={location_encoded}"
    type: search
    tags: [canada]

  - name: "CareerJet Canada"
    url: "https://www.careerjet.ca/search/jobs?s={query_encoded}&l={location_encoded}"
    type: search
    tags: [canada]

  - name: "Job Bank Canada"
    url: "https://www.jobbank.gc.ca/jobsearch/jobsearch?searchstring={query_encoded}&locationstring={location_encoded}&fage=2&sort=D"
    type: search
    tags: [canada]

  # General tech (with search)
  - name: "Dice"
    url: "https://www.dice.com/jobs?q={query_encoded}&location=Remote&pageSize=100"
    type: search
    tags: [us, remote]

  - name: "SimplyHired"
    url: "https://www.simplyhired.com/search?q={query_encoded}&l={location_encoded}"
